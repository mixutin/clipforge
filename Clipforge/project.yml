name: Clipforge
options:
  createIntermediateGroups: true
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.0
settings:
  base:
    CURRENT_PROJECT_VERSION: 3
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: Resources/Info.plist
    MACOSX_DEPLOYMENT_TARGET: 15.2
    MARKETING_VERSION: 0.3.0
    PRODUCT_BUNDLE_IDENTIFIER: com.clipforge.app
    PRODUCT_NAME: Clipforge
    SWIFT_VERSION: 6.0
targets:
  Clipforge:
    type: application
    platform: macOS
    deploymentTarget: "15.2"
    sources:
      - Sources
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.clipforge.app
    dependencies:
      - sdk: ScreenCaptureKit.framework
      - sdk: Carbon.framework
      - package: Sparkle
schemes:
  Clipforge:
    build:
      targets:
        Clipforge: all
    run:
      config: Debug
