name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ClipforgeServer
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall app

      - name: Import app
        env:
          CLIPFORGE_BASE_URL: http://127.0.0.1:8000
          CLIPFORGE_UPLOAD_DIR: uploads
          CLIPFORGE_API_TOKEN: ci-token
          CLIPFORGE_MAX_UPLOAD_MB: "10"
        run: python -c "from app.main import create_app; app = create_app(); print(app.title)"

  macos:
    name: macOS Build
    runs-on: macos-latest
    defaults:
      run:
        working-directory: Clipforge
    steps:
      - uses: actions/checkout@v6

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app
        run: xcodebuild -project Clipforge.xcodeproj -scheme Clipforge -configuration Debug -destination 'platform=macOS' build
